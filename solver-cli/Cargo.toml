[package]
name = "solver-cli"
version = "0.1.0"
edition = "2021"
description = "Unified CLI for OIF solver deployment, configuration, and execution"
license = "MIT"

[[bin]]
name = "solver-cli"
path = "src/main.rs"

[dependencies]
# CLI parsing
clap = { version = "4.4", features = ["derive", "env"] }

# Async runtime
tokio = { version = "1.34", features = ["full"] }
async-trait = "0.1"

# Ethereum
alloy = { version = "1.0", features = [
    "full",
    "provider-http",
    "signer-local",
    "contract",
    "sol-types",
    "json-rpc",
    "rpc-types",
    "eips",
] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.9"
serde_yaml = "0.9"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
hex = "0.4"
dirs = "5.0"
colored = "2.1"
indicatif = "0.17"
dialoguer = "0.11"
sha2 = "0.10"
dotenvy = "0.15"
which = "6.0"
reqwest = { version = "0.12", features = ["json"] }

# Unix process management
[target.'cfg(unix)'.dependencies]
nix = { version = "0.28", features = ["signal", "process"] }

# OIF solver components (optional, for solver runtime)
solver-service = { path = "../oif/oif-solver/crates/solver-service", optional = true }
solver-config = { path = "../oif/oif-solver/crates/solver-config", optional = true }

[features]
default = ["solver-runtime"]
solver-runtime = ["solver-service", "solver-config"]
integration = []

[dev-dependencies]
tempfile = "3.8"
assert_cmd = "2.0"
predicates = "3.0"
